<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Or Eille AI</title>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Or Eille AI">
  <meta name="theme-color" content="#F7F4EF">
  <style>
    @font-face {
      font-family: "Basteleur";
      src: url("Basteleur-Moonlight.ttf") format("truetype");
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #F7F4EF; font-family: "Basteleur", serif; min-height: 100vh; display: flex; flex-direction: column; color: #1A3A8F; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 20px 32px; border-bottom: 1px solid #e0d8cc; }
    .header-logo { display: flex; align-items: center; gap: 12px; }
    .header-logo img { width: 44px; height: 44px; }
    .header-logo-text { font-family: "Basteleur"; font-size: 1.3rem; color: #C4993A; }
    nav a { font-family: "Basteleur"; font-size: 1rem; text-decoration: none; margin-left: 24px; transition: opacity 0.2s; font-weight: bold; }
    nav a:hover { opacity: 0.8; }
    #nav-accueil { color: #C4993A; }
    #nav-assistant { color: #1A3A8F; }
    #nav-abonnement { color: #C4993A; }
    .page { display: none; flex: 1; flex-direction: column; }
    .page.active { display: flex; }
    .hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 24px; }
    .hero-logo { width: 160px; height: 160px; margin-bottom: 32px; animation: float 4s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }
    .hero h1 { font-family: "Basteleur"; font-size: clamp(3rem, 8vw, 6rem); color: #C4993A; line-height: 1.05; margin-bottom: 16px; }
    .hero-slogan { color: #1A3A8F !important; font-family: "Basteleur", serif; font-size: clamp(1rem, 2.5vw, 1.3rem); margin-bottom: 52px; font-style: italic; }
    .hero-slogan-override { font-family: "Basteleur"; font-size: clamp(1rem, 2.5vw, 1.3rem); color: #1a1a1a; margin-bottom: 52px; }
    .hero-buttons { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .btn-primary { background: #1A3A8F; color: #C4993A; border: none; padding: 12px 28px; border-radius: 50px; font-family: "Basteleur"; font-size: 0.95rem; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 20px rgba(26,58,143,0.3); }
    .btn-primary:hover { transform: translateY(-2px); }
    .btn-secondary { background: #C4993A; color: #1A3A8F; border: 2px solid #C4993A; padding: 12px 28px; border-radius: 50px; font-family: "Basteleur"; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; }
    .btn-secondary:hover { background: #C4993A; color: white; }
    .assistant-page { flex: 1; display: flex; flex-direction: column; padding: 24px; padding-bottom: 100px; max-width: 800px; margin: 0 auto; width: 100%; }
    .assistant-title { font-family: "Basteleur"; font-size: 1.8rem; color: #C4993A; margin-bottom: 20px; text-align: center; }
    .messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; margin-bottom: 20px; min-height: 300px; max-height: 60vh; padding: 16px; background: white; border-radius: 16px; border: 1px solid #e0d8cc; }
    .message { padding: 14px 18px; border-radius: 12px; font-family: "Basteleur"; font-size: 1rem; line-height: 1.5; max-width: 85%; }
    .message.user { background: #C4993A; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .message.assistant { background: #F7F4EF; color: #1A3A8F; align-self: flex-start; border: 1px solid #e0d8cc; border-bottom-left-radius: 4px; }
    .message.thinking { background: #f0ede8; color: #aaa; align-self: flex-start; font-style: italic; font-size: 0.9rem; }
    .input-zone { display: flex; flex-direction: column; gap: 8px; width: 100%; }
    .input-zone textarea { width: 100%; padding: 12px 14px; border-radius: 16px; border: 2px solid #C4993A; font-family: "Basteleur"; font-size: 16px; resize: none; background: white; outline: none; min-height: 120px; max-height: 200px; box-sizing: border-box; }
    .input-zone textarea:focus { border-color: #1A3A8F; }
    .input-buttons { display: flex; gap: 8px; justify-content: flex-end; }
    @media (max-width: 600px) {
      .input-zone { flex-wrap: wrap; }
      .input-zone textarea { width: 100%; min-height: 56px; font-size: 1.1rem; margin-bottom: 8px; }
      .input-zone .btn-mic, .input-zone .btn-speaker, .input-zone .btn-send, .input-zone button { width: 46px; height: 46px; font-size: 1.2rem; }
    }
    .btn-send, .btn-mic, .btn-speaker, .btn-crayon { border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 1rem; cursor: pointer; flex-shrink: 0; transition: transform 0.2s; }
    .btn-send { background: #C4993A; color: white; box-shadow: 0 4px 16px rgba(196,153,58,0.3); }
    .btn-send:disabled { background: #ddd; cursor: not-allowed; }
    .btn-mic { background: #F7F4EF; color: #C4993A; border: 2px solid #C4993A; }
    .btn-mic.recording { background: #C4993A; color: white; animation: pulse 1s infinite; }
    .btn-speaker { background: #F7F4EF; color: #1a1a1a; border: 2px solid #1A3A8F; }
    .btn-speaker.active { background: #C4993A; color: white; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    .btn-zone { display:flex; gap:10px; justify-content:flex-end; margin-top:8px; }
    .input-zone textarea { width:100%; padding:12px 16px; border-radius:16px; border:2px solid #e0d8cc; font-family:"Basteleur",serif; font-size:16px; resize:none; background:white; outline:none; min-height:56px; max-height:150px; box-sizing:border-box; }
    footer { text-align: center; padding: 20px; font-family: "Basteleur"; font-size: 0.85rem; color: #bbb; border-top: 1px solid #e0d8cc; }
    @media (max-width: 600px) { header { padding: 16px 20px; } nav { display: none; } .hero-logo { width: 130px; height: 130px; } .hero-buttons { flex-direction: column; align-items: center; } .btn-primary, .btn-secondary { width: 260px; text-align: center; } }
  </style>
</head>
<body>
  <header>
    <div class="header-logo">
      <img src="logo.png" alt="Or Eille AI" />
      <span class="header-logo-text">Or Eille AI</span>
    </div>
    <nav>
      <a href="#" id="nav-accueil">Accueil</a>
      <a href="#" id="nav-assistant">Assistant</a>
      <a href="#" id="nav-abonnement">Abonnement</a>
    </nav>
  </header>

  <div class="page active" id="page-accueil">
    <main class="hero">
      <img class="hero-logo" src="logo.png" alt="Or Eille AI logo" />
      <h1>Or Eille AI</h1>
      <p class="hero-slogan" style="color:#1A3A8F;">L'IA qui s'exécute au doigt et à l'œil.</p>
      <div class="hero-buttons">
        <button class="btn-primary" id="btn-essayer">Essayer gratuitement</button>
        <button class="btn-secondary">S'abonner</button>
      </div>
    </main>
  </div>

  <div class="page" id="page-assistant">
    <div class="assistant-page">
      <div class="assistant-title">Or Eille AI &mdash; Assistant</div>
      <div class="messages" id="messages">
        <div class="message assistant">Bonjour. Je suis là. Qu'est-ce que tu souhaites créer aujourd'hui ?</div>
      </div>
      <div class="input-zone">
        <textarea id="input" placeholder="ou écris ici..."></textarea>
        <div class="input-buttons">
        <button class="btn-mic" id="btn-mic" title="Parler">&#127908;</button>
        <button class="btn-speaker" id="btn-speaker" title="Activer la voix">&#128266;</button>
        <button class="btn-crayon" id="btn-crayon" title="Taper" onclick="document.getElementById('input').focus()">&#9998;</button>
        <button class="btn-send" id="btn-send">&#9654;</button>
        </div>
      </div>
    </div>
  </div>

  <footer>&copy; Madame Or Eille Studio &mdash; Tous droits réservés</footer>

  <script>
    var speakerOn = false;
    var recognition = null;
    var isRecording = false;

    var SYSTEM = "Tu es Or Eille AI, assistant de Madame Or Eille Studio. REGLE : reponds toujours a la question posee en premier. Vocabulaire francais correct, courant a soutenu. Tutoiement. Chaleureux et direct.";

    document.getElementById('nav-accueil').addEventListener('click', function(e) { e.preventDefault(); showPage('accueil'); });
    document.getElementById('nav-assistant').addEventListener('click', function(e) { e.preventDefault(); showPage('assistant'); });
    document.getElementById('btn-essayer').addEventListener('click', function() { showPage('assistant'); });
    document.getElementById('btn-send').addEventListener('click', envoyer);
    document.getElementById('btn-mic').addEventListener('click', toggleMic);
    document.getElementById('btn-speaker').addEventListener('click', toggleSpeaker);
    document.getElementById('input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); envoyer(); }
    });

    function showPage(p) {
      document.querySelectorAll('.page').forEach(function(x) { x.classList.remove('active'); });
      document.getElementById('page-' + p).classList.add('active');
    }

    function toggleSpeaker() {
      speakerOn = !speakerOn;
      var btn = document.getElementById('btn-speaker');
      if (speakerOn) { btn.classList.add('active'); } else { btn.classList.remove('active'); }
    }

    function speak(text) {
      if (!speakerOn) return;
      window.speechSynthesis.cancel();
      var utt = new SpeechSynthesisUtterance(text);
      utt.lang = 'fr-FR';
      utt.rate = 0.95;
      window.speechSynthesis.speak(utt);
    }

    function toggleMic() {
      if (isRecording) { stopMic(); } else { startMic(); }
    }

    function startMic() {
      var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { alert('Reconnaissance vocale non disponible sur ce navigateur.'); return; }
      recognition = new SR();
      recognition.lang = 'fr-FR';
      recognition.continuous = true;
      recognition.interimResults = true;
      var finalTranscript = '';
      var silenceTimer = null;
      recognition.onresult = function(e) {
        var interim = '';
        for (var i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) {
            finalTranscript += e.results[i][0].transcript + ' ';
          } else {
            interim += e.results[i][0].transcript;
          }
        }
        document.getElementById('input').value = finalTranscript + interim;
        clearTimeout(silenceTimer);
        silenceTimer = setTimeout(function() {
          if (finalTranscript.trim()) {
            stopMic();
            envoyer();
          }
        }, 1500);
      };
      recognition.onerror = function() { stopMic(); };
      recognition.onend = function() { stopMic(); };
      recognition.start();
      isRecording = true;
      document.getElementById('btn-mic').classList.add('recording');
    }

    function stopMic() {
      if (recognition) recognition.stop();
      isRecording = false;
      document.getElementById('btn-mic').classList.remove('recording');
    }

    async function envoyer() {
      var input = document.getElementById('input');
      var messages = document.getElementById('messages');
      var btn = document.getElementById('btn-send');
      var texte = input.value.trim();
      if (!texte) return;
      var msgUser = document.createElement('div');
      msgUser.className = 'message user';
      msgUser.textContent = texte;
      messages.appendChild(msgUser);
      input.value = '';
      btn.disabled = true;
      var thinking = document.createElement('div');
      thinking.className = 'message thinking';
      thinking.textContent = 'Or Eille reflechit...';
      messages.appendChild(thinking);
      messages.scrollTop = messages.scrollHeight;
      var hist = [];
      document.querySelectorAll('.message.user, .message.assistant').forEach(function(m) {
        hist.push({role: m.classList.contains('user') ? 'user' : 'assistant', content: m.textContent});
      });
      try {
        var r = await fetch('/api/claude', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({system: SYSTEM, messages: hist})});
        var d = await r.json();
        thinking.remove();
        var reponse = (d.content && d.content[0] && d.content[0].text) ? d.content[0].text : 'Je ne parviens pas a repondre pour l instant.';
        var msg = document.createElement('div');
        msg.className = 'message assistant';
        msg.textContent = reponse;
        messages.appendChild(msg);
        speak(reponse);
      } catch(e) {
        thinking.remove();
        var err = document.createElement('div');
        err.className = 'message assistant';
        err.textContent = 'La connexion est momentanement indisponible.';
        messages.appendChild(err);
      }
      btn.disabled = false;
      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
</html>
